name: Publish GitHub Package

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "Build Windows MSI" ]
    types: [ completed ]

permissions:
  contents: read
  packages: write

jobs:
  publish-package:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'master'
        )
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare package metadata for CI publish
        shell: bash
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');const owner=process.env.GITHUB_REPOSITORY_OWNER.toLowerCase();p.name='@'+owner+'/cs2overlay-electron';const base=(p.version||'1.0.0').split('-')[0];p.version=base+'-ci.'+process.env.GITHUB_RUN_NUMBER;p.publishConfig={registry:'https://npm.pkg.github.com'};fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');"
          echo "Prepared package:"
          node -e "const p=require('./package.json');console.log(p.name, p.version)"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

