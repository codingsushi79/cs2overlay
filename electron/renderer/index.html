<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS2 Overlay</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="root">
    <div class="top-strip">
      <div class="team left" id="left-team">
        <img id="logo-left" class="logo" />
        <div class="team-name" id="team-left-name">CT</div>
        <div class="team-score" id="team-left-score">0</div>
      </div>
      <div class="center-meta">
        <div id="round-info">LIVE</div>
        <div id="round-timer">1:55</div>
      </div>
      <div class="team right" id="right-team">
        <div class="team-score" id="team-right-score">0</div>
        <div class="team-name" id="team-right-name">T</div>
        <img id="logo-right" class="logo" />
      </div>
    </div>

    <div class="minimap-card">
      <img id="minimap-frame" class="minimap-frame" />
      <img id="minimap-map" class="minimap-map" />
    </div>

    <div class="status" id="cs2-status">Waiting for CS2</div>

    <div class="bottom-hud">
      <div class="players left" id="players-left"></div>
      <div class="focus-card">
        <img id="focus-avatar" />
        <div id="focus-name">No POV</div>
      </div>
      <div class="players right" id="players-right"></div>
    </div>
  </div>
  <script src="./renderer.js"></script>
</body>
</html>
